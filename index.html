<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Analyzer</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff7eb3;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4e9b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 Resume Analyzer</h1>
    <p>Upload your resume and get smart job suggestions</p>

    <form action="/analyze" method="post" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <br>
        <button type="submit">Analyze Resume 🚀</button>
    </form>
</div>

</body>
</html>
