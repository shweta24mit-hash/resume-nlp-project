<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #43cea2, #185a9d);
        color: white;
        text-align: center;
    }

    .container {
        margin-top: 100px;
    }

    h1 {
        font-size: 40px;
    }

    .upload-box {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        display: inline-block;
        margin-top: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input[type="file"] {
        margin: 20px 0;
        color: white;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #ff7eb3;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4e9b;
        transform: scale(1.05);
    }

    .note {
        margin-top: 15px;
        font-size: 14px;
        color: #ddd;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Welcome, {{ user }} 👋</h1>
    <p>Upload your resume and get AI-powered insights</p>

    <div class="upload-box">
        <form action="/analyze" method="post" enctype="multipart/form-data">
            <input type="file" name="resume" required>
            <br>
            <button type="submit">Analyze Resume 🚀</button>
        </form>

        <p class="note">Supported format: PDF</p>
    </div>
</div>

</body>
</html>
